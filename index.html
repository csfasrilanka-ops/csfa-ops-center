<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CSFA | Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #020617; font-family: system-ui, sans-serif; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 1.5rem; padding: 1.25rem; }
        .input { background: #020617 !important; border: 1px solid #334155 !important; padding: 0.75rem; border-radius: 0.75rem; color: white !important; width: 100%; outline: none; font-size: 16px; }
        .btn-primary { background: #2563eb; color: white; padding: 0.8rem; border-radius: 0.75rem; font-weight: 800; cursor: pointer; text-transform: uppercase; border: none; }
        .btn-save { background: #10b981; color: white; padding: 0.6rem 1rem; border-radius: 0.75rem; font-size: 12px; font-weight: 900; }
        .tab-btn { padding-bottom: 1rem; border-bottom: 2px solid transparent; color: #64748b; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.2s; }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <!-- LOGIN -->
    <div id="login-zone" class="fixed inset-0 z-50 flex items-center justify-center bg-[#020617] px-6">
        <div class="card w-full max-w-sm text-center border-blue-900/20">
            <h1 class="text-2xl font-black italic uppercase mb-8 tracking-tighter">Pilot <span class="text-blue-500">Access</span></h1>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="input">
                <input type="password" id="password" placeholder="Password" class="input">
                <button id="login-btn" onclick="signIn()" class="btn-primary w-full">Open Systems</button>
            </div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden max-w-6xl mx-auto pb-20">
        <header class="flex justify-between items-center mb-8 border-b border-white/5 pb-6">
            <h1 class="text-xl font-black uppercase italic tracking-tighter text-white">CSFA <span class="text-blue-600">OPS</span></h1>
            <button onclick="signOut()" class="text-[10px] font-black text-slate-500 uppercase border border-slate-800 px-4 py-2 rounded-full">Logout</button>
        </header>

        <nav class="flex gap-8 text-[11px] mb-10 overflow-x-auto no-scrollbar border-b border-white/5">
            <button onclick="switchTab('sessions')" id="t-sessions" class="tab-btn tab-active whitespace-nowrap">Sessions</button>
            <button onclick="switchTab('locations')" id="t-locations" class="tab-btn whitespace-nowrap">Sites</button>
            <button onclick="switchTab('addons')" id="t-addons" class="tab-btn whitespace-nowrap">Add-ons</button>
            <button onclick="switchTab('settings')" id="t-settings" class="tab-btn whitespace-nowrap">Global Settings</button>
        </nav>

        <div id="content-area"></div>
    </div>

    <script>
        const SB_URL = "https://rbvbkibhxmmnpzntbzvt.supabase.co";
        const SB_KEY = "sb_publishable_KHW9RkQqLeB1YMSrSSHowg_tOe_KjdT"; 
        const client = window.supabase.createClient(SB_URL, SB_KEY);

        let appData = { sessions: [], locations: [], addons: [], config: [] };
        let currentTab = 'sessions';

        // --- AUTH ---
        window.signIn = async function() {
            const btn = document.getElementById('login-btn');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            btn.innerText = "Verifying...";
            const { error } = await client.auth.signInWithPassword({ email, password });
            if (error) { alert(error.message); btn.innerText = "Open Systems"; } 
            else checkAuth();
        };

        window.signOut = async function() { await client.auth.signOut(); location.reload(); };

        async function checkAuth() {
            const { data: { session } } = await client.auth.getSession();
            if (session) {
                document.getElementById('login-zone').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadData();
            }
        }

        async function loadData() {
            const [s, l, a, c] = await Promise.all([
                client.from('booking_sessions').select('*').order('id', { ascending: false }),
                client.from('booking_locations').select('*').order('id', { ascending: true }),
                client.from('booking_addons').select('*').order('id', { ascending: true }),
                client.from('booking_config').select('*')
            ]);
            appData = { sessions: s.data, locations: l.data, addons: a.data, config: c.data };
            switchTab(currentTab); // Return to the tab you were on
        }

        // --- UI ---
        window.switchTab = function(tab) {
            currentTab = tab;
            const area = document.getElementById('content-area');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active', 'text-blue-500'));
            document.getElementById('t-'+tab).classList.add('tab-active', 'text-blue-500');

            if(tab === 'sessions') {
                area.innerHTML = `
                    <div class="card border-blue-600/20 mb-8">
                        <h3 class="text-blue-500 font-bold uppercase text-[10px] mb-4 tracking-widest">Add New Date</h3>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-3 items-end">
                            <input type="date" id="new-date" class="input">
                            <select id="new-loc" class="input">${appData.locations.map(l => `<option value="${l.id}">${l.name}</option>`).join('')}</select>
                            <input type="number" id="new-slots" class="input" placeholder="Seats" value="5">
                            <button onclick="createNewSession()" class="btn-primary">Add Flight</button>
                        </div>
                    </div>
                    <div class="space-y-3">
                        ${appData.sessions.map(s => `
                            <div class="card flex flex-col md:flex-row gap-4 items-end">
                                <div class="flex-1 w-full"><label class="text-[9px] font-bold text-slate-500 uppercase">Label</label><input id="sess-date-${s.id}" class="input mt-1" value="${s.date_text}"></div>
                                <div class="w-full md:w-24"><label class="text-[9px] font-bold text-slate-500 uppercase">Seats</label><input type="number" id="sess-slots-${s.id}" class="input mt-1 text-center" value="${s.slots_available}"></div>
                                <div class="flex gap-2 w-full md:w-auto">
                                    <button onclick="saveSession(${s.id})" class="btn-save flex-1">SAVE</button>
                                    <button onclick="deleteRow('booking_sessions', ${s.id})" class="p-2 text-red-500">✕</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            if(tab === 'locations') {
                area.innerHTML = `
                    <div class="mb-6"><button onclick="addLocation()" class="btn-primary px-10">+ Create New Site</button></div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${appData.locations.map(l => `
                            <div class="card space-y-4">
                                <input id="loc-name-${l.id}" class="input font-bold" value="${l.name}">
                                <div class="flex gap-2">
                                    <select id="loc-status-${l.id}" class="input !text-xs uppercase"><option value="available" ${l.status === 'available' ? 'selected' : ''}>Operational</option><option value="not-flyable" ${l.status === 'not-flyable' ? 'selected' : ''}>Blown Out</option></select>
                                    <button onclick="saveLocation(${l.id})" class="btn-save">SAVE</button>
                                    <button onclick="deleteRow('booking_locations', ${l.id})" class="p-2 text-red-500">✕</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            if(tab === 'addons') {
                area.innerHTML = `
                    <div class="mb-6"><button onclick="addAddon()" class="btn-primary px-10">+ New Addon</button></div>
                    <div class="space-y-4">
                        ${appData.addons.map(a => `
                            <div class="card space-y-4 border-slate-800">
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div class="md:col-span-2"><label class="text-[9px] font-bold text-slate-500 uppercase ml-2">Name</label><input id="add-name-${a.id}" class="input" value="${a.name}"></div>
                                    <div><label class="text-[9px] font-bold text-slate-500 uppercase ml-2">Price (LKR)</label><input type="number" id="add-price-${a.id}" class="input text-blue-400 font-bold" value="${a.price}"></div>
                                </div>
                                <div><label class="text-[9px] font-bold text-slate-500 uppercase ml-2">Description</label><input id="add-desc-${a.id}" class="input" value="${a.description || ''}" placeholder="e.g. 4K raw footage from GoPro"></div>
                                <div class="flex gap-2">
                                    <select id="add-status-${a.id}" class="input !text-xs uppercase"><option value="active" ${a.status === 'active' ? 'selected' : ''}>Visible</option><option value="inactive" ${a.status === 'inactive' ? 'selected' : ''}>Hidden</option></select>
                                    <button onclick="saveAddon(${a.id})" class="btn-save w-full">SAVE ADDON</button>
                                    <button onclick="deleteRow('booking_addons', ${a.id})" class="p-2 text-red-500">✕</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            if(tab === 'settings') {
                const base = appData.config.find(c => c.key === 'basePrice')?.value || 20000;
                const locTag = appData.config.find(c => c.key === 'location')?.value || "";
                area.innerHTML = `
                    <div class="card max-w-md space-y-6">
                        <h2 class="text-blue-500 font-black uppercase text-xs italic">Global Site Settings</h2>
                        <div><label class="text-[9px] font-bold text-slate-500 uppercase block mb-2">Default Pilot Fee (LKR)</label><input id="cfg-price" type="number" value="${base}" class="input text-2xl font-black text-blue-400"></div>
                        <div><label class="text-[9px] font-bold text-slate-500 uppercase block mb-2">Active Site Display Name</label><input id="cfg-loc" type="text" value="${locTag}" class="input"></div>
                        <button onclick="saveGlobalConfig()" class="btn-primary w-full">Update Global Data</button>
                    </div>
                `;
            }
        };

        // --- HANDLERS ---
        window.createNewSession = async function() {
            const dateVal = document.getElementById('new-date').value;
            if(!dateVal) return alert("Pick a date.");
            const dateObj = new Date(dateVal);
            const formattedDate = dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: '2-digit' });
            
            await client.from('booking_sessions').insert([{ 
                date_text: formattedDate, slots_available: parseInt(document.getElementById('new-slots').value), 
                location_id: parseInt(document.getElementById('new-loc').value), start_time: '08:30 AM', status: 'active' 
            }]);
            loadData();
        };

        window.saveSession = async function(id) {
            await client.from('booking_sessions').update({ 
                date_text: document.getElementById(`sess-date-${id}`).value,
                slots_available: parseInt(document.getElementById(`sess-slots-${id}`).value)
            }).eq('id', id);
            alert("Saved.");
        };

        window.addLocation = async function() {
            const name = prompt("Site Name:");
            if(name) { await client.from('booking_locations').insert([{ name, status: 'available' }]); loadData(); }
        };

        window.saveLocation = async function(id) {
            await client.from('booking_locations').update({ 
                name: document.getElementById(`loc-name-${id}`).value, 
                status: document.getElementById(`loc-status-${id}`).value 
            }).eq('id', id);
            alert("Site Updated.");
        };

        window.addAddon = async function() {
            const name = prompt("Addon Name:");
            if(name) { await client.from('booking_addons').insert([{ name, price: 5000, description: '', status: 'active' }]); loadData(); }
        };

        window.saveAddon = async function(id) {
            await client.from('booking_addons').update({ 
                name: document.getElementById(`add-name-${id}`).value, 
                price: parseInt(document.getElementById(`add-price-${id}`).value),
                description: document.getElementById(`add-desc-${id}`).value,
                status: document.getElementById(`add-status-${id}`).value 
            }).eq('id', id);
            alert("Add-on Updated.");
        };

        window.saveGlobalConfig = async function() {
            await client.from('booking_config').update({ value: document.getElementById('cfg-price').value }).eq('key', 'basePrice');
            await client.from('booking_config').update({ value: document.getElementById('cfg-loc').value }).eq('key', 'location');
            alert("Global settings updated.");
            loadData();
        };

        window.deleteRow = async function(table, id) {
            if(confirm("Confirm deletion?")) {
                const { error } = await client.from(table).delete().eq('id', id);
                if(error) alert("Error: Remove linked data first."); else loadData();
            }
        };

        checkAuth();
    </script>
</body>
</html>
